<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#4f46e5"/>

  <!-- Left antenna -->
  <line x1="45" y1="24" x2="30" y2="9" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="29" cy="7.5" r="3.5" fill="white"/>

  <!-- Right antenna -->
  <line x1="55" y1="24" x2="70" y2="9" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="71" cy="7.5" r="3.5" fill="white"/>

  <!-- Head -->
  <circle cx="50" cy="32" r="11" fill="white"/>

  <!-- Body -->
  <ellipse cx="50" cy="66" rx="18" ry="24" fill="white"/>

  <!-- Spine -->
  <line x1="50" y1="42" x2="50" y2="90" stroke="#4f46e5" stroke-width="3" stroke-linecap="round"/>

  <!-- Body segments -->
  <line x1="33" y1="57" x2="67" y2="57" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32.5" y1="72" x2="67.5" y2="72" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left legs -->
  <line x1="32" y1="54" x2="14" y2="46" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="66" x2="13" y2="66" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="78" x2="14" y2="86" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Right legs -->
  <line x1="68" y1="54" x2="86" y2="46" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="68" y1="66" x2="87" y2="66" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="68" y1="78" x2="86" y2="86" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>
